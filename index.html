<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Chloé ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#2b0015,#5e002f,#8d0046,#b30059);
    overflow:hidden;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.container{
    text-align:center;
    z-index:2;
    padding:20px;
    max-width:900px;
}

.photo{
    width:300px;
    height:300px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    box-shadow:0 0 50px rgba(255,255,255,.8);
    animation:float 4s ease-in-out infinite;
}

h1{
    color:white;
    font-size:4rem;
    margin-top:20px;
    text-shadow:0 0 20px rgba(255,255,255,.9);
}

p{
    color:white;
    font-size:1.3rem;
    margin-top:15px;
}

.buttons{
    margin-top:30px;
}

button{
    margin:10px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#8d0046;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.message{
    margin-top:30px;
    color:white;
    font-size:1.6rem;
    min-height:60px;
    padding:10px;
}

.heart{
    position:absolute;
    color:#ffd1dc;
    animation:fall linear infinite;
    user-select:none;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <img id="slideshow" src="photo1.png" class="photo" alt="Photo">

    <h1>Je t'aime Chloé ❤️</h1>

    <p>Chaque instant avec toi est précieux.</p>

    <div class="buttons">
        <button id="musicBtn">Lancer la musique 🎵</button>
        <button id="loveBtn">Mots d'amour ❤️</button>
    </div>

    <div class="message" id="message">
        Clique sur un bouton ❤️
    </div>

</div>

<audio id="music" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const music = document.getElementById("music");
    const musicBtn = document.getElementById("musicBtn");
    const loveBtn = document.getElementById("loveBtn");
    const message = document.getElementById("message");
    const slideshow = document.getElementById("slideshow");

    const photos = ["photo1.png", "photo2.jpg", "photo3.jpg"];
    let currentPhoto = 0;

    setInterval(() => {
        currentPhoto = (currentPhoto + 1) % photos.length;
        slideshow.src = photos[currentPhoto];
    }, 3000);

    musicBtn.addEventListener("click", () => {
        music.play()
        .then(() => {
            message.innerText = "La musique joue pour toi ❤️";
        })
        .catch(err => {
            console.log(err);
            message.innerText = "Impossible de lancer la musique.";
        });
    });

    const loveMessages = [
        "Je t'aime ❤️",
        "Tu es la meilleure ❤️",
        "Tu es mon bonheur ❤️",
        "Tu es mon rayon de soleil ☀️",
        "Mon cœur est à toi ❤️",
        "Tu rends ma vie plus belle ❤️",
        "Je pense à toi ❤️",
        "Tu es unique ❤️",
        "Avec toi tout est mieux ❤️"
    ];

    let loveInterval = null;

    loveBtn.addEventListener("click", () => {
        if(loveInterval !== null) return;

        loveInterval = setInterval(() => {
            const randomMessage =
                loveMessages[Math.floor(Math.random() * loveMessages.length)];

            message.innerText = randomMessage;
        }, 2000);
    });

    for(let i=0;i<80;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.animationDuration = (3 + Math.random()*7) + "s";
        heart.style.fontSize = (15 + Math.random()*35) + "px";
        document.body.appendChild(heart);
    }

});
</script>

</body>
</html>
