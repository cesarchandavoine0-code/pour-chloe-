<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Chloé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
 
body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: #0D0408; font-family: 'Montserrat', sans-serif; color: #F9EEF3;
}
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#cv-main { z-index: 1; } #cv-parts { z-index: 2; }
 
.vignette {
  position: fixed; inset: 0; z-index: 4;
  background: radial-gradient(ellipse 88% 88% at 50% 50%, transparent 28%, rgba(6,1,4,0.72) 100%);
  pointer-events: none;
}
 
#ui {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 1.5rem; pointer-events: none;
}
#ui > * { pointer-events: all; }
 
.ornament {
  font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; color: #D4A853;
  letter-spacing: 0.45em; text-transform: uppercase;
  opacity: 0; animation: fadeup 1.2s ease 0.2s forwards; margin-bottom: 1.2rem;
}
 
.photo-wrap {
  position: relative; width: 170px; height: 170px; margin-bottom: 1.8rem;
  opacity: 0; animation: fadeup 1.2s ease 0.5s forwards;
}
.ring {
  position: absolute; border-radius: 50%; top: 50%; left: 50%;
  transform: translate(-50%, -50%); animation: spin linear infinite;
}
.ring1 { width: 194px; height: 194px; border: 1px solid rgba(212,168,83,0.35); animation-duration: 22s; }
.ring2 { width: 214px; height: 214px; border: 1px dashed rgba(200,69,108,0.22); animation-duration: 38s; animation-direction: reverse; }
.ring3 { width: 234px; height: 234px; border: 1px solid rgba(242,196,208,0.09); animation-duration: 55s; }
 
.photo-img {
  width: 170px; height: 170px; border-radius: 50%; object-fit: cover;
  border: 2px solid rgba(212,168,83,0.45);
  box-shadow: 0 0 50px rgba(123,26,58,0.55), 0 0 100px rgba(123,26,58,0.2);
  background: linear-gradient(135deg, #4A0E22, #7B1A3A); display: block;
}
 
.name {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
  font-size: clamp(3.8rem, 11vw, 7rem);
  background: linear-gradient(135deg, #F2C4D0 0%, #C8456C 38%, #ECC97A 68%, #F2C4D0 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  letter-spacing: 0.06em; line-height: 1;
  opacity: 0; animation: fadeup 1.2s ease 0.8s forwards; margin-bottom: 0.45rem;
}
 
.sub {
  font-size: 0.65rem; font-weight: 100; letter-spacing: 0.5em; color: #D4A0B5;
  text-transform: uppercase; opacity: 0; animation: fadeup 1.2s ease 1s forwards; margin-bottom: 2.6rem;
}
 
.sep {
  display: flex; align-items: center; gap: 1rem; margin-bottom: 2.6rem;
  opacity: 0; animation: fadeup 1.2s ease 1.2s forwards;
}
.sep-line { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,83,0.45)); }
.sep-line.r { background: linear-gradient(270deg, transparent, rgba(212,168,83,0.45)); }
.sep-heart { color: #C8456C; font-size: 0.85rem; animation: pulseh 2.8s ease-in-out infinite; display: inline-block; }
 
.btn-main {
  font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 200;
  letter-spacing: 0.38em; text-transform: uppercase; color: #F9EEF3;
  background: transparent; border: 1px solid rgba(200,69,108,0.38);
  padding: 0.95rem 2.8rem; border-radius: 50px; cursor: pointer;
  transition: all 0.4s ease; opacity: 0; animation: fadeup 1.2s ease 1.4s forwards;
  margin-bottom: 0.85rem; backdrop-filter: blur(4px);
}
.btn-main:hover { border-color: #C8456C; color: #fff; transform: translateY(-2px); box-shadow: 0 0 28px rgba(200,69,108,0.22); }
 
.btn-lettre {
  font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem;
  color: #D4A853; background: none; border: none; cursor: pointer; letter-spacing: 0.1em;
  opacity: 0; animation: fadeup 1.2s ease 1.6s forwards; transition: all 0.3s ease; padding: 0.4rem 1rem;
}
.btn-lettre:hover { opacity: 0.8; letter-spacing: 0.16em; }
 
/* ── BOUTON MESSAGERIE ── */
#btn-msg {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 50;
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, #7B1A3A, #C8456C);
  border: 1px solid rgba(212,168,83,0.3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; box-shadow: 0 0 24px rgba(200,69,108,0.4);
  transition: all 0.3s ease; opacity: 0; animation: fadeup 1.2s ease 2s forwards;
}
#btn-msg:hover { transform: scale(1.1); box-shadow: 0 0 36px rgba(200,69,108,0.6); }
#msg-badge {
  position: absolute; top: -4px; right: -4px;
  background: #D4A853; color: #0D0408; border-radius: 50%;
  width: 18px; height: 18px; font-size: 0.55rem; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}
 
/* ── OVERLAY MESSAGERIE ── */
#msg-wrap {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
}
#msg-wrap.on { opacity: 1; pointer-events: all; }
 
#msg-bg {
  position: absolute; inset: 0;
  background: rgba(8,2,6,0.92); backdrop-filter: blur(12px);
}
 
#msg-box {
  position: relative; z-index: 2;
  width: min(560px, 94vw); height: min(680px, 88vh);
  background: linear-gradient(155deg, rgba(38,12,26,0.97), rgba(10,3,7,0.99));
  border: 1px solid rgba(200,69,108,0.2); border-radius: 6px;
  box-shadow: 0 0 80px rgba(123,26,58,0.35);
  display: flex; flex-direction: column; overflow: hidden;
}
 
#msg-header {
  padding: 1.2rem 1.6rem; border-bottom: 1px solid rgba(200,69,108,0.12);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(123,26,58,0.08);
}
#msg-header-title {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.2rem; color: #F2C4D0; letter-spacing: 0.08em;
}
#msg-header-sub { font-size: 0.55rem; letter-spacing: 0.2em; color: #D4A0B5; margin-top: 2px; }
.btn-close-msg {
  background: none; border: none; color: #D4A0B5; font-size: 0.6rem;
  font-family: 'Montserrat', sans-serif; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: pointer; opacity: 0.5; transition: opacity 0.3s;
}
.btn-close-msg:hover { opacity: 1; }
 
/* Zone identité */
#msg-identity {
  padding: 0.8rem 1.6rem; border-bottom: 1px solid rgba(200,69,108,0.1);
  display: flex; align-items: center; gap: 0.6rem;
}
#identity-label { font-size: 0.55rem; letter-spacing: 0.18em; color: #D4A0B5; text-transform: uppercase; }
#identity-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: #D4A853; }
#btn-switch-id {
  margin-left: auto; font-size: 0.52rem; letter-spacing: 0.15em; color: #D4A0B5;
  background: none; border: 1px solid rgba(200,69,108,0.2); padding: 0.25rem 0.7rem;
  border-radius: 20px; cursor: pointer; transition: all 0.3s; text-transform: uppercase;
}
#btn-switch-id:hover { border-color: #C8456C; color: #F9EEF3; }
 
/* Messages */
#msg-list {
  flex: 1; overflow-y: auto; padding: 1.2rem 1.4rem;
  display: flex; flex-direction: column; gap: 0.9rem;
  scrollbar-width: thin; scrollbar-color: #7B1A3A transparent;
}
#msg-list::-webkit-scrollbar { width: 2px; }
#msg-list::-webkit-scrollbar-thumb { background: #7B1A3A; }
 
.msg-empty {
  text-align: center; margin: auto;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1rem; color: rgba(212,168,83,0.35); line-height: 2;
}
 
.msg-bubble {
  max-width: 78%; display: flex; flex-direction: column; gap: 0.2rem;
}
.msg-bubble.me { align-self: flex-end; align-items: flex-end; }
.msg-bubble.her { align-self: flex-start; align-items: flex-start; }
 
.msg-sender {
  font-size: 0.5rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: #D4A0B5; margin-bottom: 0.1rem;
}
.msg-bubble.me .msg-sender { color: #D4A853; }
 
.msg-text {
  font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 300;
  line-height: 1.6; padding: 0.7rem 1.05rem; border-radius: 4px;
}
.msg-bubble.me .msg-text {
  background: linear-gradient(135deg, rgba(123,26,58,0.55), rgba(200,69,108,0.35));
  border: 1px solid rgba(200,69,108,0.25); color: #F9EEF3;
}
.msg-bubble.her .msg-text {
  background: linear-gradient(135deg, rgba(45,16,32,0.7), rgba(80,25,50,0.5));
  border: 1px solid rgba(212,168,83,0.15); color: #F2C4D0;
}
.msg-time { font-size: 0.48rem; letter-spacing: 0.12em; color: rgba(209,160,181,0.45); }
 
/* Input */
#msg-input-area {
  padding: 1rem 1.2rem; border-top: 1px solid rgba(200,69,108,0.12);
  display: flex; gap: 0.7rem; align-items: flex-end;
  background: rgba(20,5,12,0.6);
}
#msg-textarea {
  flex: 1; background: rgba(45,16,32,0.6); border: 1px solid rgba(200,69,108,0.2);
  border-radius: 4px; color: #F9EEF3; font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem; padding: 0.65rem 0.9rem; resize: none; min-height: 42px; max-height: 110px;
  line-height: 1.5; outline: none; transition: border-color 0.3s;
  scrollbar-width: thin; scrollbar-color: #7B1A3A transparent;
}
#msg-textarea:focus { border-color: rgba(200,69,108,0.5); }
#msg-textarea::placeholder { color: rgba(209,160,181,0.35); font-style: italic; }
#btn-send {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #7B1A3A, #C8456C);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all 0.3s; color: #fff;
  box-shadow: 0 0 12px rgba(200,69,108,0.3);
}
#btn-send:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(200,69,108,0.5); }
 
/* ── PIN overlay ── */
#pin-wrap {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.4s;
}
#pin-wrap.on { opacity: 1; pointer-events: all; }
#pin-bg { position: absolute; inset: 0; background: rgba(8,2,6,0.94); backdrop-filter: blur(14px); }
#pin-box {
  position: relative; z-index: 2; text-align: center;
  background: linear-gradient(155deg, rgba(45,16,32,0.97), rgba(13,4,8,0.99));
  border: 1px solid rgba(200,69,108,0.2); border-radius: 6px;
  padding: 2.8rem 3rem; width: min(320px, 88vw);
  box-shadow: 0 0 60px rgba(123,26,58,0.3);
}
#pin-title {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.3rem; color: #F2C4D0; margin-bottom: 0.4rem;
}
#pin-sub { font-size: 0.55rem; letter-spacing: 0.2em; color: #D4A0B5; text-transform: uppercase; margin-bottom: 1.8rem; }
#pin-dots { display: flex; justify-content: center; gap: 0.8rem; margin-bottom: 1.6rem; }
.pin-dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1px solid rgba(200,69,108,0.5); background: transparent; transition: all 0.2s;
}
.pin-dot.filled { background: #C8456C; border-color: #C8456C; box-shadow: 0 0 8px rgba(200,69,108,0.6); }
#pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1rem; }
.pin-key {
  height: 48px; background: rgba(45,16,32,0.6); border: 1px solid rgba(200,69,108,0.18);
  border-radius: 4px; color: #F9EEF3; font-family: 'Montserrat', sans-serif;
  font-size: 1rem; font-weight: 200; cursor: pointer; transition: all 0.2s;
}
.pin-key:hover { background: rgba(123,26,58,0.5); border-color: rgba(200,69,108,0.4); }
.pin-key:active { transform: scale(0.95); }
#pin-error { font-size: 0.6rem; color: #C8456C; letter-spacing: 0.15em; height: 1rem; margin-top: 0.4rem; }
#btn-pin-cancel {
  font-size: 0.55rem; letter-spacing: 0.18em; color: #D4A0B5; text-transform: uppercase;
  background: none; border: none; cursor: pointer; margin-top: 1rem; opacity: 0.6; transition: opacity 0.3s;
}
#btn-pin-cancel:hover { opacity: 1; }
 
/* ── LETTRE overlay ── */
#lettre-wrap {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.65s ease;
}
#lettre-wrap.on { opacity: 1; pointer-events: all; }
#lettre-bg { position: absolute; inset: 0; background: rgba(8,2,6,0.91); backdrop-filter: blur(10px); }
#lettre-box {
  position: relative; z-index: 2; width: min(620px, 92vw); max-height: 82vh;
  overflow-y: auto;
  background: linear-gradient(155deg, rgba(45,16,32,0.96), rgba(13,4,8,0.98));
  border: 1px solid rgba(200,69,108,0.18); border-radius: 3px; padding: 3.5rem 3.8rem 3.2rem;
  box-shadow: 0 0 90px rgba(123,26,58,0.32);
  scrollbar-width: thin; scrollbar-color: #7B1A3A transparent;
}
#lettre-box::-webkit-scrollbar { width: 2px; }
#lettre-box::-webkit-scrollbar-thumb { background: #7B1A3A; }
.l-ornament {
  text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
  color: #D4A853; opacity: 0.4; letter-spacing: 0.6em; margin-bottom: 2rem;
}
#l-text {
  font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 300;
  line-height: 2.05; color: #F9EEF3; white-space: pre-wrap;
}
#l-cursor {
  display: inline-block; width: 1px; height: 1em; background: #D4A853;
  vertical-align: middle; margin-left: 1px; animation: blink 0.8s steps(1) infinite;
}
.btn-close {
  position: absolute; top: 1rem; right: 1.5rem; background: none; border: none;
  color: #D4A0B5; font-size: 0.65rem; font-family: 'Montserrat', sans-serif;
  font-weight: 200; letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; opacity: 0.45; transition: opacity 0.3s;
}
.btn-close:hover { opacity: 1; }
 
/* ── TOAST ── */
#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(70px); z-index: 300;
  background: rgba(45,16,32,0.88); border: 1px solid rgba(212,168,83,0.18);
  border-radius: 50px; padding: 0.55rem 1.4rem;
  font-size: 0.65rem; letter-spacing: 0.22em; color: #D4A0B5;
  opacity: 0; white-space: nowrap;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.5s ease;
  backdrop-filter: blur(8px);
}
#toast.on { transform: translateX(-50%) translateY(0); opacity: 1; }
 
@keyframes fadeup { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
@keyframes pulseh { 0%,100% { transform: scale(1); } 50% { transform: scale(1.22); } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
</style>
</head>
<body>
 
<canvas id="cv-main"></canvas>
<canvas id="cv-parts"></canvas>
<div class="vignette"></div>
 
<div id="ui">
  <div class="ornament">— Pour toi —</div>
  <div class="photo-wrap">
    <div class="ring ring1"></div><div class="ring ring2"></div><div class="ring ring3"></div>
    <img id="slideshow" class="photo-img" src="photo1.png" alt="Chloé">
  </div>
  <h1 class="name">Chloé</h1>
  <p class="sub">Mon amour &nbsp;·&nbsp; Mon univers</p>
  <div class="sep">
    <div class="sep-line"></div><span class="sep-heart">♥</span><div class="sep-line r"></div>
  </div>
  <button class="btn-main" id="btn-main" onclick="startExp()">Ouvre ton cœur</button>
  <button class="btn-lettre" onclick="openLettre()">Lire ma lettre ✦</button>
</div>
 
<!-- Bouton messagerie -->
<button id="btn-msg" onclick="openMsg()">
  💌
  <span id="msg-badge"></span>
</button>
 
<!-- Overlay messagerie -->
<div id="msg-wrap">
  <div id="msg-bg" onclick="closeMsg()"></div>
  <div id="msg-box">
    <div id="msg-header">
      <div>
        <div id="msg-header-title">Nos mots ♥</div>
        <div id="msg-header-sub">messages privés · persistants</div>
      </div>
      <button class="btn-close-msg" onclick="closeMsg()">✕ fermer</button>
    </div>
    <div id="msg-identity">
      <span id="identity-label">Connecté en tant que</span>
      <span id="identity-name">Chloé</span>
      <button id="btn-switch-id" onclick="switchIdentity()">Changer</button>
    </div>
    <div id="msg-list">
      <div class="msg-empty">✦<br>Vos premiers mots<br>s'écriront ici…</div>
    </div>
    <div id="msg-input-area">
      <textarea id="msg-textarea" placeholder="Écris quelque chose…" rows="1" onkeydown="handleKey(event)"></textarea>
      <button id="btn-send" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
 
<!-- PIN overlay -->
<div id="pin-wrap">
  <div id="pin-bg"></div>
  <div id="pin-box">
    <div id="pin-title">Code secret</div>
    <div id="pin-sub">Entrez votre PIN à 4 chiffres</div>
    <div id="pin-dots">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div id="pin-grid">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <button class="pin-key" onclick="pinPress('del')" style="font-size:0.75rem;letter-spacing:0.05em">⌫</button>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key" onclick="pinPress('ok')" style="background:rgba(123,26,58,0.5);">✓</button>
    </div>
    <div id="pin-error"></div>
    <button id="btn-pin-cancel" onclick="closePIN()">Annuler</button>
  </div>
</div>
 
<!-- Lettre overlay -->
<div id="lettre-wrap">
  <div id="lettre-bg" onclick="closeLettre()"></div>
  <div id="lettre-box">
    <button class="btn-close" onclick="closeLettre()">✕ fermer</button>
    <div class="l-ornament">✦ &nbsp;✦ &nbsp;✦</div>
    <div id="l-text"></div><span id="l-cursor"></span>
  </div>
</div>
 
<div id="toast"></div>
<audio id="music" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>
 
<script>
(function () {
 
// ════════════════════════════════════════
//  CANVAS & ANIMATION
// ════════════════════════════════════════
var cvMain = document.getElementById('cv-main');
var ctx = cvMain.getContext('2d');
var cvPt = document.getElementById('cv-parts');
var ctxPt = cvPt.getContext('2d');
var W = 0, H = 0;
 
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  cvMain.width = W; cvMain.height = H;
  cvPt.width = W; cvPt.height = H;
  drawStaticBg();
}
 
var stars = [];
for (var i = 0; i < 150; i++) {
  stars.push({ x: Math.random(), y: Math.random()*0.62, r: 0.3+Math.random()*1.4,
    a: 0.25+Math.random()*0.75, tw: Math.random()*6.28, tws: 0.006+Math.random()*0.018,
    col: Math.random()<0.15?'#ECC97A':Math.random()<0.2?'#F2C4D0':'#ffffff' });
}
 
var meteors = [];
function newMeteor() {
  return { x:0.05+Math.random()*0.75, y:0.02+Math.random()*0.22, prog:0,
    speed:0.005+Math.random()*0.004, len:0.08+Math.random()*0.08,
    delay:4+Math.random()*10, active:false };
}
for (var m = 0; m < 2; m++) meteors.push(newMeteor());
 
var trees = [];
for (var ti = 0; ti < 14; ti++) {
  var side = ti<5?0:ti<10?1:2;
  trees.push({ xr:side===0?0.02+Math.random()*0.16:side===1?0.82+Math.random()*0.16:0.18+Math.random()*0.64,
    yr:0.72+Math.random()*0.05, hr:0.065+Math.random()*0.09, wr:0.024+Math.random()*0.018,

// ════════════════════════════════════════
//  MESSAGERIE
// ════════════════════════════════════════
 
var PIN_OWNER = '2008';
var currentUser = 'Chloé'; // par défaut = elle
var messages = [];
var msgOpen = false;
var lastSeenCount = 0;
 
// Clés de stockage
var STORAGE_KEY = 'chloe-messages';
 
// Charger les messages depuis le stockage partagé
async function loadMessages() {
  try {
    var result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      messages = JSON.parse(result.value);
    }
  } catch(e) {
    messages = [];
  }
  renderMessages();
  updateBadge();
}
 
// Sauvegarder les messages
async function saveMessages() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(messages), true);
  } catch(e) {
    console.error('Erreur sauvegarde', e);
  }
}
 
function formatTime(ts) {
  var d = new Date(ts);
  var h = d.getHours(), mn = d.getMinutes();
  return (h<10?'0':'')+h+'h'+(mn<10?'0':'')+mn;
}
 
function renderMessages() {
  var list = document.getElementById('msg-list');
  if (messages.length === 0) {
    list.innerHTML = '<div class="msg-empty">✦<br>Vos premiers mots<br>s\'écriront ici…</div>';
    return;
  }
  list.innerHTML = '';
  messages.forEach(function(msg) {
    var isMe = msg.author === currentUser;
    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + (isMe ? 'me' : 'her');
    bubble.innerHTML =
      '<div class="msg-sender">' + msg.author + '</div>' +
      '<div class="msg-text">' + msg.text.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div>' +
      '<div class="msg-time">' + formatTime(msg.ts) + '</div>';
    list.appendChild(bubble);
  });
  list.scrollTop = list.scrollHeight;
}
 
function updateBadge() {
  var badge = document.getElementById('msg-badge');
  var unread = messages.length - lastSeenCount;
  if (!msgOpen && unread > 0) {
    badge.style.display = 'flex';
    badge.textContent = unread > 9 ? '9+' : unread;
  } else {
    badge.style.display = 'none';
  }
}
 
window.openMsg = function() {
  msgOpen = true;
  document.getElementById('msg-wrap').classList.add('on');
  lastSeenCount = messages.length;
  updateBadge();
  renderMessages();
  // Rafraîchir depuis le stockage
  loadMessages().then(function() {
    lastSeenCount = messages.length;
    updateBadge();
  });
};
 
window.closeMsg = function() {
  msgOpen = false;
  lastSeenCount = messages.length;
  document.getElementById('msg-wrap').classList.remove('on');
  updateBadge();
};
 
window.sendMsg = function() {
  var ta = document.getElementById('msg-textarea');
  var text = ta.value.trim();
  if (!text) return;
  var msg = { author: currentUser, text: text, ts: Date.now() };
  messages.push(msg);
  saveMessages();
  ta.value = '';
  ta.style.height = 'auto';
  renderMessages();
};
 
window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
  // Auto-resize textarea
  setTimeout(function() {
    var ta = document.getElementById('msg-textarea');
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
  }, 0);
};
 
// Rafraîchissement automatique toutes les 10s si ouvert
setInterval(function() {
  if (msgOpen) {
    loadMessages().then(function() {
      lastSeenCount = messages.length;
      updateBadge();
    });
  } else {
    loadMessages();
  }
}, 10000);
 
// ── Changement d'identité ──
window.switchIdentity = function() {
  if (currentUser !== 'Chloé') {
    // Repasser en Chloé
    currentUser = 'Chloé';
    document.getElementById('identity-name').textContent = 'Chloé';
    showToast('Connecté en tant que Chloé ♥');
    renderMessages();
  } else {
    // Demander le PIN pour devenir l'expéditeur
    openPIN();
  }
};
 
// ── PIN ──
var pinBuffer = '';
var pinCallback = null;
 
function openPIN() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-wrap').classList.add('on');
}
 
window.closePIN = function() {
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-wrap').classList.remove('on');
};
 
function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('dot' + i);
    dot.classList.toggle('filled', i < pinBuffer.length);
  }
}
 
window.pinPress = function(val) {
  if (val === 'del') {
    pinBuffer = pinBuffer.slice(0, -1);
    updatePinDots();
    return;
  }
  if (val === 'ok') {
    checkPIN();
    return;
  }
  if (pinBuffer.length >= 4) return;
  pinBuffer += val;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(checkPIN, 150);
  }
};
 
function checkPIN() {
  if (pinBuffer === PIN_OWNER) {
    document.getElementById('pin-wrap').classList.remove('on');
    currentUser = 'Lui ♥';
    document.getElementById('identity-name').textContent = 'Lui ♥';
    showToast('Mode expéditeur activé ♥');
    renderMessages();
  } else {
    document.getElementById('pin-error').textContent = 'Code incorrect';
    pinBuffer = '';
    updatePinDots();
    setTimeout(function(){ document.getElementById('pin-error').textContent=''; }, 1800);
  }
}
 
// Init
loadMessages();
 
})();
</script>
