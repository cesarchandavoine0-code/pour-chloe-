<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Chloé ❤️</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    height:100vh;
    background:linear-gradient(135deg,#ff4d88,#ff80bf,#ffd6e7);
    overflow:hidden;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}
.container{
    text-align:center;
    z-index:2;
    padding:20px;
    max-width:800px;
}
.photo{
    width:280px;
    height:280px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    box-shadow:0 0 40px rgba(255,255,255,0.9);
    animation:float 4s ease-in-out infinite;
}
h1{
    color:white;
    font-size:4rem;
    margin-top:20px;
    text-shadow:0 0 20px rgba(255,255,255,.8);
    animation:pulse 2s infinite;
}
p{
    color:white;
    font-size:1.4rem;
    margin-top:20px;
    text-shadow:0 0 10px rgba(255,255,255,.6);
}
button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4d88;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(255,255,255,.5);
}
button:hover{
    transform:scale(1.1);
}
.message{
    margin-top:25px;
    color:white;
    font-size:1.2rem;
    opacity:0;
    transition:1s;
}
.show{
    opacity:1;
}
#coeur-btn {
    margin-top: 15px;
    padding: 15px 35px;
    border: 3px solid white;
    border-radius: 30px;
    background: transparent;
    color: white;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(255,255,255,.3);
    display: block;
    margin-left: auto;
    margin-right: auto;
}
#coeur-btn:hover {
    background: rgba(255,255,255,0.2);
    transform: scale(1.1);
}
#lettre-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    justify-content: center;
    align-items: center;
}
#lettre-overlay.active {
    display: flex;
}
#lettre-box {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 40px 45px;
    max-width: 600px;
    width: 90%;
    color: white;
    font-family: 'Georgia', serif;
    font-size: 1.15rem;
    line-height: 1.9;
    position: relative;
    box-shadow: 0 0 60px rgba(255, 77, 136, 0.4);
    max-height: 80vh;
    overflow-y: auto;
}
#lettre-text {
    white-space: pre-wrap;
    min-height: 2em;
}
#cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: white;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s steps(1) infinite;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
#close-lettre {
    position: absolute;
    top: 12px; right: 18px;
    background: none;
    border: none;
    color: white;
    font-size: 1.6rem;
    cursor: pointer;
    opacity: 0.7;
    padding: 0;
    box-shadow: none;
    margin: 0;
}
#close-lettre:hover {
    opacity: 1;
    transform: scale(1.2);
    background: none;
}
.heart{
    position:absolute;
    color:white;
    animation:fall linear infinite;
    user-select:none;
    pointer-events:none;
}
#music-status {
    margin-top: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 0.85rem;
    min-height: 20px;
}
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}
@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(110vh) rotate(20deg);
        opacity:0;
    }
}
</style>
</head>
<body>
<div class="container">
    <img id="slideshow" src="photo1.png" class="photo" alt="Photo">
    <h1>Je t'aime Chloé ❤️</h1>
    <p>Chaque moment avec toi est un souvenir que je garde précieusement.</p>
    <button id="mainBtn" onclick="startExperience()">Clique ici 💌</button>
    <div id="music-status"></div>
    <div class="message" id="message">
        Merci d'être dans ma vie ❤️
    </div>
    <button id="coeur-btn" onclick="ouvrirLettre()">Mon cœur 💗</button>
</div>

<!-- Overlay lettre -->
<div id="lettre-overlay">
    <div id="lettre-box">
        <button id="close-lettre" onclick="fermerLettre()">✕</button>
        <div id="lettre-text"></div><span id="cursor"></span>
    </div>
</div>

<!-- Mets ton fichier music.mp3 dans le même dossier que ce fichier HTML -->
<audio id="music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
    <source src="music.ogg" type="audio/ogg">
</audio>

<script>
let musicStarted = false;

function startExperience() {
    const music = document.getElementById("music");
    const statusEl = document.getElementById("music-status");
    const btn = document.getElementById("mainBtn");

    // Affiche le message
    document.getElementById("message").classList.add("show");

    // Change le bouton
    btn.textContent = "❤️";
    btn.style.fontSize = "1.8rem";
    btn.style.padding = "12px 25px";

    if (musicStarted) return;

    const playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                musicStarted = true;
                statusEl.textContent = "";
            })
            .catch(error => {
                console.warn("Lecture audio bloquée :", error);
                statusEl.textContent = "🔇 Clique encore pour lancer la musique";
                // Deuxième tentative au prochain clic utilisateur
                btn.onclick = retryMusic;
            });
    }
}

function retryMusic() {
    const music = document.getElementById("music");
    const statusEl = document.getElementById("music-status");
    const btn = document.getElementById("mainBtn");

    music.play()
        .then(() => {
            musicStarted = true;
            statusEl.textContent = "";
            btn.onclick = startExperience;
        })
        .catch(err => {
            console.warn("Toujours bloqué :", err);
            statusEl.textContent = "⚠️ Autorise le son dans ton navigateur.";
        });
}

// Slideshow photos
const photos = ["photo1.png", "photo2.jpg", "photo3.jpg"];
let currentPhoto = 0;
setInterval(() => {
    currentPhoto = (currentPhoto + 1) % photos.length;
    const img = document.getElementById("slideshow");
    img.style.opacity = "0";
    img.style.transition = "opacity 0.5s";
    setTimeout(() => {
        img.src = photos[currentPhoto];
        img.style.opacity = "1";
    }, 500);
}, 3000);

// Lettre typewriter
const lettreTexte = `Ma Chloé,

Je ne sais pas toujours trouver les mots dans la vraie vie… alors je les écris ici, pour toi.

Je suis pas un garcon aussi fort laisse paraitre, en effet des tiktok suffisent a me faire pleurer.

Pourtant, c'est un coté de moi que je cherche a ne pas montrer.

Au dela de tout ce qui fait ma sensibilité, il y a toi. Celle qui me fait tourner toute les questions dans ma tete.

malheureusement je suis pas plus fort quand il s'agit de mes sentiments envers toi. 

Je te demande de pas tout garder pour toi alors que je suis le premier a ne pas parler de ce que je ressens. Je t'ai dit
il y a pas si longtemps que si tu te sens pas bien tu peux tout me dire. Mais pour que tu y arrives il faut d'abord que 
je m'ouvre peut etre plus a toi ; 

Tout d'abord je suis quelqu'un qui a peur de l'avenir, peur de grandir. 
Ensuite je suis quelqu'un qui est facilement blessé par les mots, malgres que j'aime faire de l'autodérision.
Enfin, je suis quelqu'un qui se sent seul malgrès que j'ai des amis.

Aujourd'hui je suis en remise en question sur beaucoup de chose car tu as changé comment je ressens les choses.
Tu as balayé beaucoup de mes problemes, mais tu as emmené beaucoup



Je t'aime ❤️`;

let typewriterTimeout = null;
let lettreOuverte = false;

function ouvrirLettre() {
    if (lettreOuverte) return;
    lettreOuverte = true;
    const overlay = document.getElementById('lettre-overlay');
    const textEl = document.getElementById('lettre-text');
    const cursor = document.getElementById('cursor');
    overlay.classList.add('active');
    textEl.textContent = '';
    cursor.style.display = 'inline-block';
    let i = 0;
    function type() {
        if (i < lettreTexte.length) {
            textEl.textContent += lettreTexte[i];
            i++;
            const delay = lettreTexte[i - 1] === '\n' ? 120 :
                          '.!?,'.includes(lettreTexte[i - 1]) ? 200 + Math.random() * 150 :
                          40 + Math.random() * 40;
            typewriterTimeout = setTimeout(type, delay);
        } else {
            cursor.style.display = 'none';
        }
    }
    type();
}

function fermerLettre() {
    clearTimeout(typewriterTimeout);
    lettreOuverte = false;
    document.getElementById('lettre-overlay').classList.remove('active');
    document.getElementById('lettre-text').textContent = '';
    document.getElementById('cursor').style.display = 'inline-block';
}

// Coeurs qui tombent
for (let i = 0; i < 70; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "-50px";
    heart.style.animationDuration = (3 + Math.random() * 6) + "s";
    heart.style.animationDelay = (Math.random() * 8) + "s";
    heart.style.fontSize = (15 + Math.random() * 35) + "px";
    heart.style.opacity = (0.4 + Math.random() * 0.6).toString();
    document.body.appendChild(heart);
}
</script>
</body>
</html>
