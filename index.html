<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour Chloé ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#3b001f,#6d0038,#a1004f,#d10066);
    overflow:hidden;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.container{
    text-align:center;
    z-index:2;
    padding:20px;
    max-width:900px;
}

.photo{
    width:300px;
    height:300px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid white;
    box-shadow:0 0 50px rgba(255,255,255,0.8);
    animation:float 4s ease-in-out infinite;
}

h1{
    color:white;
    font-size:4rem;
    margin-top:20px;
    text-shadow:0 0 25px rgba(255,255,255,.9);
    animation:pulse 2s infinite;
}

p{
    color:white;
    font-size:1.4rem;
    margin-top:20px;
}

.buttons{
    margin-top:30px;
}

button{
    margin:10px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#8b0047;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

.message{
    margin-top:30px;
    color:white;
    font-size:1.6rem;
    min-height:50px;
    opacity:0;
    transition:1s;
}

.show{
    opacity:1;
}

.heart{
    position:absolute;
    color:#ffd1dc;
    animation:fall linear infinite;
    user-select:none;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}

@keyframes fall{
    from{
        transform:translateY(-100px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <img id="slideshow" src="photo1.png" class="photo" alt="Photo">

    <h1>Je t'aime Chloé ❤️</h1>

    <p>Chaque instant avec toi est précieux.</p>

    <div class="buttons">
        <button onclick="startExperience()">Lancer la musique 🎵</button>
        <button onclick="startLoveGenerator()">Mots d'amour ❤️</button>
    </div>

    <div class="message" id="message"></div>

</div>

<audio id="music" preload="auto" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const photos = ["photo1.png","photo2.jpg","photo3.jpg"];
let currentPhoto = 0;

setInterval(() => {
    currentPhoto = (currentPhoto + 1) % photos.length;
    document.getElementById("slideshow").src = photos[currentPhoto];
}, 3000);

function startExperience(){
    const music = document.getElementById("music");
    music.load();

    music.play().then(() => {
        console.log("Musique démarrée");
    }).catch(err => {
        console.log("Erreur audio :", err);
    });

    document.getElementById("message").innerText =
    "Merci d'être dans ma vie ❤️";
    document.getElementById("message").classList.add("show");
}

const loveMessages = [
    "Je t'aime ❤️",
    "Tu es la meilleure ❤️",
    "Tu es mon bonheur ❤️",
    "Tu es mon rayon de soleil ☀️",
    "Mon cœur est à toi ❤️",
    "Tu rends ma vie plus belle ❤️",
    "Je pense à toi tout le temps ❤️",
    "Tu es unique ❤️",
    "Avec toi tout est mieux ❤️",
    "Tu comptes énormément pour moi ❤️"
    "nooblarde"
    "gros bbl mdrrr"
    "les hauts et les bas dans la vie"
    "merci ma cherieeeeeee"
];

let loveInterval = null;

function startLoveGenerator(){
    const message = document.getElementById("message");
    message.classList.add("show");

    if(loveInterval) return;

    loveInterval = setInterval(() => {
        let randomText =
        loveMessages[Math.floor(Math.random()*loveMessages.length)];

        message.innerText = randomText;
    }, 2000);
}

for(let i=0;i<80;i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (3 + Math.random()*7) + "s";
    heart.style.fontSize = (15 + Math.random()*35) + "px";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
</html>
